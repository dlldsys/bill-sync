<!DOCTYPE html>
<html>
<head>
    <title>OCR解析测试</title>
</head>
<body>
    <h1>OCR解析测试</h1>
    <div id="output"></div>
    
    <script>
        // 模拟parseBillText函数的核心逻辑
        function parseBillText(rawText) {
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            if (lines.length === 0) {
                return [{
                    amount: 0,
                    date: new Date().toISOString(),
                    description: '未识别到内容',
                    confidence: 0,
                }];
            }
            
            const results = [];
            
            // 简化的金额匹配
            const amountPattern = /[¥￥$]?\s*(\d+\.?\d{0,2})/;
            
            // 逐行解析
            for (const line of lines) {
                if (/^(日期|时间|金额|描述|合计|总计)/.test(line)) continue;
                if (/^[-=]+$/.test(line)) continue;
                
                const amountMatch = line.match(amountPattern);
                if (amountMatch) {
                    const amount = parseFloat(amountMatch[1]);
                    if (!isNaN(amount) && amount > 0 && amount < 100000) {
                        // 提取描述（去除金额）
                        let description = line.replace(/[¥￥$]\s*\d+\.?\d{0,2}/g, '').trim();
                        
                        results.push({
                            amount: amount,
                            date: new Date().toISOString(),
                            description: description || '未识别',
                            confidence: 60,
                        });
                    }
                }
            }
            
            return results;
        }
        
        // 测试数据
        const wechatBill = `2024年03月25日
支出
星巴克咖啡 35.00元
2024年03月25日
支出
地铁 5.00元
2024年03月25日  
支出
午餐 25.00元`;

        const result = parseBillText(wechatBill);
        
        document.getElementById('output').innerHTML = `
            <h2>解析结果 (${result.length} 条)</h2>
            ${result.map((bill, index) => `
                <div style="border: 1px solid #ccc; padding: 10px; margin: 10px;">
                    <strong>记录 ${index + 1}:</strong><br>
                    金额: ${bill.amount}元<br>
                    描述: ${bill.description}<br>
                    置信度: ${bill.confidence}%
                </div>
            `).join('')}
        `;
    </script>
</body>
</html>
