<!DOCTYPE html>
<html>
<head>
    <title>OCR解析测试 - 修复后</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>OCR解析测试 - 修复后</h1>
    <div>
        <button onclick="testWeChat()">测试微信账单</button>
        <button onclick="testAlipay()">测试支付宝账单</button>
    </div>
    <div id="output"></div>
    
    <script>
        // 模拟修复后的parseBillText函数
        function parseBillText(rawText) {
            console.log('原始文本:', rawText);
            
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            console.log('分割后行数:', lines.length);
            
            if (lines.length === 0) {
                return [{
                    amount: 0,
                    date: new Date().toISOString(),
                    description: '未识别到内容',
                    confidence: 0,
                }];
            }
            
            const results = [];
            
            // 检测是否有日期作为全局日期
            let globalDate;
            const dateMatch = rawText.match(/(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})/);
            if (dateMatch) {
                const year = parseInt(dateMatch[1]);
                const month = parseInt(dateMatch[2]);
                const day = parseInt(dateMatch[3]);
                if (month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                    globalDate = new Date(year, month - 1, day).toISOString();
                    console.log('检测到全局日期:', globalDate);
                }
            }
            
            // 判断是否为账单列表格式
            const isListFormat = lines.some(line => {
                const hasAmount = /\d+\.?\d{0,2}/.test(line);
                const hasDate = /\d{1,4}[-/年]\d{1,2}[-/月]\d{1,2}/.test(line) || /\d{1,2}[-/]\d{1,2}/.test(line);
                return hasAmount && hasDate;
            });
            
            console.log('是否为列表格式:', isListFormat);
            
            if (isListFormat) {
                console.log('使用列表格式解析');
                // 逐行解析账单列表
                for (const line of lines) {
                    console.log('处理行:', line);
                    
                    // 跳过标题行
                    if (/^(日期|时间|金额|描述|合计|总计)/.test(line)) {
                        console.log('跳过标题行');
                        continue;
                    }
                    // 跳过分隔行
                    if (/^[-=]+$/.test(line)) {
                        console.log('跳过分隔行');
                        continue;
                    }
                    
                    // 简化的金额匹配
                    const amountMatch = line.match(/[¥￥]\s*(\d+\.?\d{0,2})/);
                    if (amountMatch) {
                        const amount = parseFloat(amountMatch[1]);
                        console.log('找到金额:', amount);
                        
                        if (!isNaN(amount) && amount > 0 && amount < 100000) {
                            // 提取描述（去除金额）
                            let description = line.replace(/[¥￥]\s*\d+\.?\d{0,2}/g, '').trim();
                            console.log('提取描述:', description);
                            
                            results.push({
                                amount: amount,
                                date: globalDate || new Date().toISOString(),
                                description: description || '未识别',
                                confidence: 60,
                            });
                        }
                    }
                }
            } else {
                console.log('使用单条账单格式解析');
                // 单条账单模式
                let mainAmount = 0;
                let mainDescription = '';
                
                // 找最大金额作为主金额
                const allAmounts = [];
                const amountMatches = rawText.matchAll(/[¥￥]\s*(\d+\.?\d{0,2})/g);
                console.log('找到所有金额:', amountMatches);
                
                for (const match of amountMatches) {
                    const amount = parseFloat(match[1]);
                    if (amount >= 1 && amount < 100000) {
                        allAmounts.push(amount);
                    }
                }
                
                if (allAmounts.length > 0) {
                    mainAmount = Math.max(...allAmounts);
                    console.log('主金额:', mainAmount);
                }
                
                results.push({
                    amount: mainAmount,
                    date: globalDate || new Date().toISOString(),
                    description: mainDescription || '未识别',
                    confidence: mainAmount > 0 ? 60 : 30,
                });
            }
            
            return results;
        }
        
        // 测试数据
        const wechatBill = `2024年03月25日
支出
星巴克咖啡 35.00元
2024年03月25日
支出
地铁 5.00元
2024年03月25日  
支出
午餐 25.00元`;

        function testWeChat() {
            console.log('=== 测试微信账单 ===');
            const result = parseBillText(wechatBill);
            console.log('识别到', result.length, '条记录');
            
            let html = '<h2>解析结果 (' + result.length + ' 条)</h2>';
            result.forEach((bill, index) => {
                html += `
                    <div style="border: 1px solid #ccc; padding: 10px; margin: 10px;">
                        <strong>记录 ${index + 1}:</strong><br>
                        金额: ${bill.amount}元<br>
                        描述: ${bill.description}<br>
                        置信度: ${bill.confidence}%
                    </div>
                `;
            });
            document.getElementById('output').innerHTML = html;
        }
        
        function testAlipay() {
            document.getElementById('output').innerHTML = '<p>支付宝账单测试待实现</p>';
        }
    </script>
</body>
</html>
